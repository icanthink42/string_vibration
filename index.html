<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibrating String</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="stringCanvas"></canvas>

    <div class="timescale-container">
        <input type="range" id="timescaleSlider" min="-3" max="0" step="0.01" value="0">
        <div class="timescale-label" id="timescaleLabel">1x</div>
    </div>

    <div class="slider-container">
        <div class="slider-track" id="sliderTrack"></div>
        <input type="range" id="freqSlider" min="0" max="1500" value="243">
        <div class="freq-label" id="freqLabel">243 Hz</div>
    </div>

    <script src="simulation.js"></script>
</body>
</html>
