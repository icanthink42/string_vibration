<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibrating String</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="stringCanvas"></canvas>

    <div class="timescale-container">
        <input type="range" id="timescaleSlider" min="-3" max="0" step="0.01" value="-0.7">
        <div class="timescale-label" id="timescaleLabel">0.2x</div>
    </div>

    <button id="soundToggle" class="sound-toggle">Sound Off</button>

    <div class="mode-toggle">
        <button id="normalMode" class="mode-btn active">Normal</button>
        <button id="pianoMode" class="mode-btn">Piano</button>
    </div>

    <div class="slider-container">
        <div class="slider-track" id="sliderTrack"></div>
        <input type="range" id="freqSlider" min="0" max="1500" value="243">
        <div class="freq-label" id="freqLabel">243 Hz</div>
    </div>

    <div class="piano-container" id="pianoContainer" style="display: none;">
        <div class="piano">
            <div class="key white" data-note="C4" data-key="a"><span>A</span></div>
            <div class="key black" data-note="C#4" data-key="w"><span>W</span></div>
            <div class="key white" data-note="D4" data-key="s"><span>S</span></div>
            <div class="key black" data-note="D#4" data-key="e"><span>E</span></div>
            <div class="key white" data-note="E4" data-key="d"><span>D</span></div>
            <div class="key white" data-note="F4" data-key="f"><span>F</span></div>
            <div class="key black" data-note="F#4" data-key="t"><span>T</span></div>
            <div class="key white" data-note="G4" data-key="g"><span>G</span></div>
            <div class="key black" data-note="G#4" data-key="y"><span>Y</span></div>
            <div class="key white" data-note="A4" data-key="h"><span>H</span></div>
            <div class="key black" data-note="A#4" data-key="u"><span>U</span></div>
            <div class="key white" data-note="B4" data-key="j"><span>J</span></div>
            <div class="key white" data-note="C5" data-key="z"><span>Z</span></div>
            <div class="key black" data-note="C#5" data-key="1"><span>1</span></div>
            <div class="key white" data-note="D5" data-key="x"><span>X</span></div>
            <div class="key black" data-note="D#5" data-key="2"><span>2</span></div>
            <div class="key white" data-note="E5" data-key="c"><span>C</span></div>
            <div class="key white" data-note="F5" data-key="v"><span>V</span></div>
            <div class="key black" data-note="F#5" data-key="3"><span>3</span></div>
            <div class="key white" data-note="G5" data-key="b"><span>B</span></div>
            <div class="key black" data-note="G#5" data-key="4"><span>4</span></div>
            <div class="key white" data-note="A5" data-key="n"><span>N</span></div>
            <div class="key black" data-note="A#5" data-key="5"><span>5</span></div>
            <div class="key white" data-note="B5" data-key="m"><span>M</span></div>
        </div>
        <div class="piano-label" id="pianoLabel">Press a key</div>
    </div>

    <script src="simulation.js"></script>
</body>
</html>
